services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-codeconnect}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codeconnect}
      POSTGRES_DB: ${POSTGRES_DB:-codeconnect}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codeconnect}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
